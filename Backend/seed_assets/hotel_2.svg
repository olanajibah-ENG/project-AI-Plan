<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="riadSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a9ebd" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#faf5ed"/>
    </linearGradient>
    <linearGradient id="riadWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf5ed"/>
      <stop offset="100%" stop-color="#e8ddd0"/>
    </linearGradient>
    <linearGradient id="riadWallSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8ddd0"/>
      <stop offset="100%" stop-color="#d4c4b0"/>
    </linearGradient>
    <pattern id="tilePattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#faf5ed"/>
      <rect x="0" y="0" width="20" height="20" fill="#1a6b5a" opacity="0.15"/>
      <rect x="20" y="20" width="20" height="20" fill="#1a6b5a" opacity="0.15"/>
      <rect x="0" y="20" width="20" height="20" fill="#c96442" opacity="0.1"/>
      <rect x="20" y="0" width="20" height="20" fill="#c96442" opacity="0.1"/>
      <path d="M10,0 L20,10 L10,20 L0,10 Z" fill="#b8860b" opacity="0.08"/>
      <path d="M30,0 L40,10 L30,20 L20,10 Z" fill="#b8860b" opacity="0.08"/>
      <path d="M10,20 L20,30 L10,40 L0,30 Z" fill="#b8860b" opacity="0.08"/>
      <path d="M30,20 L40,30 L30,40 L20,30 Z" fill="#b8860b" opacity="0.08"/>
    </pattern>
    <linearGradient id="fountainWater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6b5a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1a6b5a" stop-opacity="0.8"/>
    </linearGradient>
    <radialGradient id="skyLight" cx="0.5" cy="0" r="0.8">
      <stop offset="0%" stop-color="#faf5ed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#faf5ed" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadowSoft">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Sky visible through courtyard opening -->
  <rect width="1280" height="720" fill="url(#riadSky)"/>
  <ellipse cx="640" cy="0" rx="500" ry="200" fill="url(#skyLight)"/>

  <!-- Back wall -->
  <rect x="200" y="80" width="880" height="640" fill="url(#riadWall)"/>

  <!-- Left wall (perspective) -->
  <path d="M0,0 L200,80 L200,720 L0,720 Z" fill="url(#riadWallSide)"/>

  <!-- Right wall (perspective) -->
  <path d="M1280,0 L1080,80 L1080,720 L1280,720 Z" fill="url(#riadWallSide)"/>

  <!-- Wall shadow at top -->
  <rect x="200" y="80" width="880" height="8" fill="#2c1810" opacity="0.1"/>

  <!-- Central arched doorway -->
  <g>
    <rect x="520" y="160" width="240" height="320" fill="#2c1810" opacity="0.6" rx="2"/>
    <path d="M520,280 Q640,120 760,280" fill="#2c1810" opacity="0.6"/>
    <!-- Inner arch detail -->
    <path d="M540,280 Q640,140 740,280" fill="#2c1810" opacity="0.4"/>
    <!-- Door panels -->
    <rect x="560" y="300" width="70" height="180" fill="#2c1810" opacity="0.7" rx="2"/>
    <rect x="650" y="300" width="70" height="180" fill="#2c1810" opacity="0.7" rx="2"/>
    <!-- Door details -->
    <circle cx="622" cy="390" r="4" fill="#b8860b" opacity="0.5"/>
    <circle cx="658" cy="390" r="4" fill="#b8860b" opacity="0.5"/>
    <!-- Arch decorative border -->
    <path d="M520,280 Q640,120 760,280" fill="none" stroke="#b8860b" stroke-width="3" opacity="0.25"/>
    <path d="M530,280 Q640,135 750,280" fill="none" stroke="#b8860b" stroke-width="1.5" opacity="0.15"/>
  </g>

  <!-- Left side arched window -->
  <g>
    <rect x="260" y="180" width="100" height="160" fill="#2c1810" opacity="0.4" rx="2"/>
    <path d="M260,240 Q310,170 360,240" fill="#2c1810" opacity="0.4"/>
    <!-- Mashrabiya pattern inside -->
    <g stroke="#b8860b" stroke-width="0.5" fill="none" opacity="0.2">
      <line x1="280" y1="240" x2="280" y2="340"/>
      <line x1="300" y1="240" x2="300" y2="340"/>
      <line x1="320" y1="240" x2="320" y2="340"/>
      <line x1="340" y1="240" x2="340" y2="340"/>
      <line x1="260" y1="270" x2="360" y2="270"/>
      <line x1="260" y1="300" x2="360" y2="300"/>
    </g>
  </g>

  <!-- Right side arched window -->
  <g>
    <rect x="920" y="180" width="100" height="160" fill="#2c1810" opacity="0.4" rx="2"/>
    <path d="M920,240 Q970,170 1020,240" fill="#2c1810" opacity="0.4"/>
    <g stroke="#b8860b" stroke-width="0.5" fill="none" opacity="0.2">
      <line x1="940" y1="240" x2="940" y2="340"/>
      <line x1="960" y1="240" x2="960" y2="340"/>
      <line x1="980" y1="240" x2="980" y2="340"/>
      <line x1="1000" y1="240" x2="1000" y2="340"/>
      <line x1="920" y1="270" x2="1020" y2="270"/>
      <line x1="920" y1="300" x2="1020" y2="300"/>
    </g>
  </g>

  <!-- Upper floor railing/balustrade -->
  <rect x="200" y="140" width="880" height="4" fill="#c96442" opacity="0.4"/>
  <g fill="#c96442" opacity="0.25">
    <rect x="220" y="128" width="3" height="16"/>
    <rect x="240" y="128" width="3" height="16"/>
    <rect x="260" y="128" width="3" height="16"/>
    <rect x="280" y="128" width="3" height="16"/>
    <rect x="300" y="128" width="3" height="16"/>
    <rect x="980" y="128" width="3" height="16"/>
    <rect x="1000" y="128" width="3" height="16"/>
    <rect x="1020" y="128" width="3" height="16"/>
    <rect x="1040" y="128" width="3" height="16"/>
    <rect x="1060" y="128" width="3" height="16"/>
  </g>

  <!-- Tiled floor -->
  <path d="M0,500 L200,480 L1080,480 L1280,500 L1280,720 L0,720 Z" fill="url(#tilePattern)"/>

  <!-- Floor perspective shadow -->
  <path d="M0,500 L200,480 L1080,480 L1280,500" fill="none" stroke="#2c1810" stroke-width="2" opacity="0.15"/>

  <!-- Central fountain -->
  <g>
    <!-- Fountain base (octagonal) -->
    <path d="M580,560 L620,545 L660,545 L700,560 L700,600 L660,615 L620,615 L580,600 Z" fill="#e8ddd0" stroke="#c96442" stroke-width="1.5" opacity="0.8"/>
    <!-- Water surface -->
    <path d="M590,565 L625,552 L655,552 L690,565 L690,595 L655,608 L625,608 L590,595 Z" fill="url(#fountainWater)"/>
    <!-- Water shimmer -->
    <ellipse cx="640" cy="580" rx="35" ry="15" fill="#faf5ed" opacity="0.1"/>
    <!-- Central column -->
    <rect x="634" y="530" width="12" height="35" fill="#e8ddd0" rx="2"/>
    <!-- Water drops suggestion -->
    <circle cx="640" cy="548" r="3" fill="#1a6b5a" opacity="0.2"/>
    <ellipse cx="640" cy="570" rx="20" ry="4" fill="#faf5ed" opacity="0.08"/>
  </g>

  <!-- Potted plants -->
  <g>
    <!-- Left plant -->
    <rect x="280" y="468" width="30" height="25" fill="#c96442" opacity="0.6" rx="3"/>
    <path d="M295,468 C285,440 275,430 260,425" fill="none" stroke="#1a6b5a" stroke-width="2.5" opacity="0.7"/>
    <path d="M295,468 C305,442 315,435 330,430" fill="none" stroke="#1a6b5a" stroke-width="2.5" opacity="0.7"/>
    <path d="M295,468 C292,440 288,428 285,415" fill="none" stroke="#1a6b5a" stroke-width="2" opacity="0.6"/>
    <path d="M295,468 C298,442 302,432 308,420" fill="none" stroke="#1a6b5a" stroke-width="2" opacity="0.6"/>

    <!-- Right plant -->
    <rect x="970" y="468" width="30" height="25" fill="#c96442" opacity="0.6" rx="3"/>
    <path d="M985,468 C975,440 965,430 950,425" fill="none" stroke="#1a6b5a" stroke-width="2.5" opacity="0.7"/>
    <path d="M985,468 C995,442 1005,435 1020,430" fill="none" stroke="#1a6b5a" stroke-width="2.5" opacity="0.7"/>
    <path d="M985,468 C982,440 978,428 975,415" fill="none" stroke="#1a6b5a" stroke-width="2" opacity="0.6"/>
    <path d="M985,468 C988,442 992,432 998,420" fill="none" stroke="#1a6b5a" stroke-width="2" opacity="0.6"/>

    <!-- Front left small plant -->
    <rect x="380" y="580" width="24" height="20" fill="#c96442" opacity="0.5" rx="2"/>
    <ellipse cx="392" cy="572" rx="18" ry="12" fill="#1a6b5a" opacity="0.3"/>

    <!-- Front right small plant -->
    <rect x="876" y="580" width="24" height="20" fill="#c96442" opacity="0.5" rx="2"/>
    <ellipse cx="888" cy="572" rx="18" ry="12" fill="#1a6b5a" opacity="0.3"/>
  </g>

  <!-- Wall decorative zellige panels -->
  <g>
    <!-- Left panel -->
    <rect x="240" y="380" width="60" height="80" fill="none" stroke="#b8860b" stroke-width="1" opacity="0.2" rx="2"/>
    <path d="M270,380 L270,460" fill="none" stroke="#b8860b" stroke-width="0.5" opacity="0.15"/>
    <path d="M240,420 L300,420" fill="none" stroke="#b8860b" stroke-width="0.5" opacity="0.15"/>
    <path d="M240,380 L300,460" fill="none" stroke="#b8860b" stroke-width="0.3" opacity="0.1"/>
    <path d="M300,380 L240,460" fill="none" stroke="#b8860b" stroke-width="0.3" opacity="0.1"/>

    <!-- Right panel -->
    <rect x="980" y="380" width="60" height="80" fill="none" stroke="#b8860b" stroke-width="1" opacity="0.2" rx="2"/>
    <path d="M1010,380 L1010,460" fill="none" stroke="#b8860b" stroke-width="0.5" opacity="0.15"/>
    <path d="M980,420 L1040,420" fill="none" stroke="#b8860b" stroke-width="0.5" opacity="0.15"/>
    <path d="M980,380 L1040,460" fill="none" stroke="#b8860b" stroke-width="0.3" opacity="0.1"/>
    <path d="M1040,380 L980,460" fill="none" stroke="#b8860b" stroke-width="0.3" opacity="0.1"/>
  </g>

  <!-- Lanterns hanging from ceiling -->
  <g>
    <line x1="400" y1="0" x2="400" y2="100" stroke="#2c1810" stroke-width="1" opacity="0.3"/>
    <path d="M388,100 Q400,90 412,100 L408,130 Q400,135 392,130 Z" fill="#b8860b" opacity="0.4"/>
    <rect x="395" y="110" width="10" height="5" fill="#faf5ed" opacity="0.2"/>

    <line x1="880" y1="0" x2="880" y2="100" stroke="#2c1810" stroke-width="1" opacity="0.3"/>
    <path d="M868,100 Q880,90 892,100 L888,130 Q880,135 872,130 Z" fill="#b8860b" opacity="0.4"/>
    <rect x="875" y="110" width="10" height="5" fill="#faf5ed" opacity="0.2"/>
  </g>

  <!-- Light/shadow atmosphere -->
  <rect x="200" y="80" width="880" height="400" fill="#faf5ed" opacity="0.05"/>
  <ellipse cx="640" cy="400" rx="300" ry="200" fill="#b8860b" opacity="0.03"/>
</svg>