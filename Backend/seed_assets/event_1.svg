<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="alleyWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c96442" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2c1810" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="alleySky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6b5a" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#d4894a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#faf5ed" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="lanternGlow1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#b8860b" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#b8860b" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#b8860b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lanternGlow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#c96442" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#c96442" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c96442" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="groundStone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a05a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2c1810" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="lanternBlur">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <filter id="softLight">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Base dark atmosphere -->
  <rect width="1280" height="720" fill="#2c1810"/>

  <!-- Sky strip at top (narrow alley opening) -->
  <path d="M380,0 L420,200 L860,200 L900,0 Z" fill="url(#alleySky)"/>

  <!-- Left wall -->
  <path d="M0,0 L420,200 L380,720 L0,720 Z" fill="url(#alleyWall)"/>
  <!-- Left wall texture -->
  <g stroke="#2c1810" stroke-width="0.5" opacity="0.15">
    <line x1="50" y1="100" x2="350" y2="250"/>
    <line x1="40" y1="200" x2="360" y2="350"/>
    <line x1="30" y1="300" x2="370" y2="450"/>
    <line x1="20" y1="400" x2="375" y2="550"/>
    <line x1="10" y1="500" x2="380" y2="650"/>
  </g>

  <!-- Right wall -->
  <path d="M1280,0 L860,200 L900,720 L1280,720 Z" fill="url(#alleyWall)"/>
  <!-- Right wall texture -->
  <g stroke="#2c1810" stroke-width="0.5" opacity="0.15">
    <line x1="1230" y1="100" x2="930" y2="250"/>
    <line x1="1240" y1="200" x2="920" y2="350"/>
    <line x1="1250" y1="300" x2="910" y2="450"/>
    <line x1="1260" y1="400" x2="905" y2="550"/>
    <line x1="1270" y1="500" x2="900" y2="650"/>
  </g>

  <!-- Archway at the end of the alley -->
  <g>
    <path d="M420,200 Q640,80 860,200 L860,500 L420,500 Z" fill="#2c1810" opacity="0.7"/>
    <!-- Inner arch opening (lighter - suggests continuation) -->
    <path d="M460,220 Q640,120 820,220 L820,500 L460,500 Z" fill="#c96442" opacity="0.12"/>
    <path d="M480,230 Q640,140 800,230 L800,500 L480,500 Z" fill="#faf5ed" opacity="0.04"/>
    <!-- Arch decorative border -->
    <path d="M460,220 Q640,120 820,220" fill="none" stroke="#b8860b" stroke-width="2" opacity="0.15"/>
    <path d="M470,225 Q640,130 810,225" fill="none" stroke="#b8860b" stroke-width="1" opacity="0.1"/>
  </g>

  <!-- Ground (cobblestone street) -->
  <path d="M380,500 L420,300 L860,300 L900,500 L920,720 L360,720 Z" fill="url(#groundStone)"/>
  <!-- Cobblestone lines -->
  <g stroke="#2c1810" stroke-width="0.5" opacity="0.12">
    <path d="M400,400 L880,400"/>
    <path d="M395,450 L885,450"/>
    <path d="M390,500 L890,500"/>
    <path d="M385,550 L895,550"/>
    <path d="M378,600 L902,600"/>
    <path d="M370,650 L910,650"/>
    <path d="M365,700 L915,700"/>
    <!-- Vertical cobble lines -->
    <path d="M500,300 L480,720"/>
    <path d="M580,300 L570,720"/>
    <path d="M660,300 L660,720"/>
    <path d="M740,300 L750,720"/>
    <path d="M820,300 L840,720"/>
  </g>

  <!-- Left wall windows -->
  <g>
    <rect x="180" y="260" width="40" height="50" fill="#b8860b" opacity="0.12" rx="2"/>
    <rect x="180" y="260" width="40" height="50" fill="none" stroke="#2c1810" stroke-width="1" opacity="0.3" rx="2"/>
    <rect x="120" y="380" width="50" height="60" fill="#b8860b" opacity="0.08" rx="2"/>
    <rect x="120" y="380" width="50" height="60" fill="none" stroke="#2c1810" stroke-width="1" opacity="0.25" rx="2"/>
    <rect x="70" y="500" width="55" height="65" fill="#b8860b" opacity="0.1" rx="2"/>
    <rect x="70" y="500" width="55" height="65" fill="none" stroke="#2c1810" stroke-width="1" opacity="0.25" rx="2"/>
  </g>

  <!-- Right wall windows -->
  <g>
    <rect x="1060" y="260" width="40" height="50" fill="#b8860b" opacity="0.12" rx="2"/>
    <rect x="1060" y="260" width="40" height="50" fill="none" stroke="#2c1810" stroke-width="1" opacity="0.3" rx="2"/>
    <rect x="1110" y="380" width="50" height="60" fill="#b8860b" opacity="0.08" rx="2"/>
    <rect x="1110" y="380" width="50" height="60" fill="none" stroke="#2c1810" stroke-width="1" opacity="0.25" rx="2"/>
    <rect x="1155" y="500" width="55" height="65" fill="#b8860b" opacity="0.1" rx="2"/>
    <rect x="1155" y="500" width="55" height="65" fill="none" stroke="#2c1810" stroke-width="1" opacity="0.25" rx="2"/>
  </g>

  <!-- Left wall doorway -->
  <g>
    <rect x="250" y="430" width="60" height="100" fill="#2c1810" opacity="0.6" rx="2"/>
    <path d="M250,460 Q280,440 310,460" fill="#2c1810" opacity="0.5"/>
  </g>

  <!-- Hanging lanterns -->
  <g>
    <!-- Lantern 1 - left side -->
    <line x1="300" y1="200" x2="320" y2="300" stroke="#2c1810" stroke-width="1" opacity="0.4"/>
    <path d="M310,300 Q320,292 330,300 L328,325 Q320,330 312,325 Z" fill="#b8860b" opacity="0.6"/>
    <circle cx="320" cy="312" rx="50" ry="50" fill="url(#lanternGlow1)" filter="url(#lanternBlur)"/>
    <rect x="316" y="308" width="8" height="6" fill="#faf5ed" opacity="0.3"/>

    <!-- Lantern 2 - right side -->
    <line x1="980" y1="200" x2="960" y2="310" stroke="#2c1810" stroke-width="1" opacity="0.4"/>
    <path d="M950,310 Q960,302 970,310 L968,335 Q960,340 952,335 Z" fill="#c96442" opacity="0.6"/>
    <circle cx="960" cy="322" rx="50" ry="50" fill="url(#lanternGlow2)" filter="url(#lanternBlur)"/>
    <rect x="956" y="318" width="8" height="6" fill="#faf5ed" opacity="0.3"/>

    <!-- Lantern 3 - center, hanging across -->
    <line x1="500" y1="200" x2="640" y2="260" stroke="#2c1810" stroke-width="0.8" opacity="0.3"/>
    <line x1="780" y1="200" x2="640" y2="260" stroke="#2c1810" stroke-width="0.8" opacity="0.3"/>
    <path d="M628,260 Q640,250 652,260 L650,290 Q640,296 630,290 Z" fill="#b8860b" opacity="0.7"/>
    <circle cx="640" cy="275" rx="60" ry="60" fill="url(#lanternGlow1)" filter="url(#lanternBlur)"/>
    <rect x="636" y="272" width="8" height="6" fill="#faf5ed" opacity="0.35"/>

    <!-- Lantern 4 - lower left -->
    <line x1="200" y1="350" x2="230" y2="430" stroke="#2c1810" stroke-width="0.8" opacity="0.3"/>
    <path d="M220,430 Q230,422 240,430 L238,455 Q230,460 222,455 Z" fill="#c96442" opacity="0.5"/>
    <circle cx="230" cy="442" rx="45" ry="45" fill="url(#lanternGlow2)" filter="url(#lanternBlur)"/>

    <!-- Lantern 5 - lower right -->
    <line x1="1080" y1="350" x2="1050" y2="440" stroke="#2c1810" stroke-width="0.8" opacity="0.3"/>
    <path d="M1040,440 Q1050,432 1060,440 L1058,465 Q1050,470 1042,465 Z" fill="#b8860b" opacity="0.5"/>
    <circle cx="1050" cy="452" rx="45" ry="45" fill="url(#lanternGlow1)" filter="url(#lanternBlur)"/>
  </g>

  <!-- String lights across the alley -->
  <g>
    <path d="M350,350 Q500,370 640,365 Q780,360 930,350" fill="none" stroke="#2c1810" stroke-width="0.8" opacity="0.3"/>
    <g fill="#b8860b" opacity="0.4">
      <circle cx="430" cy="362" r="3"/>
      <circle cx="500" cy="366" r="3"/>
      <circle cx="570" cy="368" r="3"/>
      <circle cx="640" cy="365" r="3"/>
      <circle cx="710" cy="363" r="3"/>
      <circle cx="780" cy="360" r="3"/>
      <circle cx="850" cy="354" r="3"/>
    </g>
    <!-- Glow from string lights -->
    <g fill="#b8860b" opacity="0.03" filter="url(#softLight)">
      <circle cx="430" cy="362" r="20"/>
      <circle cx="570" cy="368" r="20"/>
      <circle cx="710" cy="363" r="20"/>
      <circle cx="850" cy="354" r="20"/>
    </g>
  </g>

  <!-- Atmospheric warm glow from lanterns on walls -->
  <ellipse cx="320" cy="350" rx="100" ry="80" fill="#b8860b" opacity="0.04" filter="url(#lanternBlur)"/>
  <ellipse cx="960" cy="360" rx="100" ry="80" fill="#c96442" opacity="0.04" filter="url(#lanternBlur)"/>
  <ellipse cx="640" cy="350" rx="150" ry="100" fill="#b8860b" opacity="0.05" filter="url(#lanternBlur)"/>

  <!-- Shadow figures (very subtle) -->
  <path d="M550,500 L540,400 L530,380 Q540,370 550,380 L560,400 L580,400 L590,380 Q600,370 610,380 L600,400 L590,500" fill="#2c1810" opacity="0.08"/>

  <!-- Warm atmosphere overlay -->
  <rect width="1280" height="720" fill="#b8860b" opacity="0.04"/>
</svg>