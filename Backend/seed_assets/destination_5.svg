<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="ancientSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c96442"/>
      <stop offset="40%" stop-color="#d4894a"/>
      <stop offset="70%" stop-color="#e8b860"/>
      <stop offset="100%" stop-color="#faf5ed" stop-opacity="0.8"/>
    </linearGradient>
    <radialGradient id="warmGlow" cx="0.5" cy="0.6" r="0.6">
      <stop offset="0%" stop-color="#b8860b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c96442" stop-opacity="0"/>
    </radialGradient>
    <pattern id="islamicPattern" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M30,0 L60,30 L30,60 L0,30 Z" fill="none" stroke="#b8860b" stroke-width="0.5" opacity="0.08"/>
      <circle cx="30" cy="30" r="10" fill="none" stroke="#b8860b" stroke-width="0.5" opacity="0.06"/>
      <path d="M15,15 L45,15 L45,45 L15,45 Z" fill="none" stroke="#b8860b" stroke-width="0.3" opacity="0.05"/>
    </pattern>
    <filter id="atmosphereGlow">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1280" height="720" fill="url(#ancientSky)"/>

  <!-- Islamic geometric pattern overlay -->
  <rect width="1280" height="720" fill="url(#islamicPattern)"/>

  <!-- Warm atmospheric glow -->
  <ellipse cx="640" cy="400" rx="500" ry="300" fill="url(#warmGlow)"/>
  <ellipse cx="640" cy="500" rx="400" ry="150" fill="#b8860b" opacity="0.08" filter="url(#atmosphereGlow)"/>

  <!-- Far cityscape silhouette -->
  <g fill="#2c1810" opacity="0.2">
    <rect x="0" y="380" width="1280" height="340"/>
    <rect x="100" y="340" width="60" height="40"/>
    <rect x="400" y="330" width="50" height="50"/>
    <rect x="800" y="350" width="55" height="30"/>
    <rect x="1150" y="345" width="50" height="35"/>
  </g>

  <!-- Large dome and minaret left -->
  <g fill="#2c1810" opacity="0.7">
    <rect x="120" y="220" width="18" height="300" rx="2"/>
    <rect x="114" y="320" width="30" height="8" rx="1"/>
    <rect x="116" y="270" width="26" height="6" rx="1"/>
    <path d="M129,220 L118,235 L140,235 Z"/>
    <circle cx="129" cy="218" r="4"/>

    <rect x="180" y="380" width="200" height="150" rx="3"/>
    <path d="M180,380 Q280,260 380,380" fill="#2c1810"/>
    <circle cx="280" cy="310" r="5" fill="#b8860b" opacity="0.3"/>
    <path d="M210,430 Q225,415 240,430 L240,470 L210,470 Z" fill="#c96442" opacity="0.3"/>
    <path d="M260,430 Q275,415 290,430 L290,470 L260,470 Z" fill="#c96442" opacity="0.3"/>
    <path d="M310,430 Q325,415 340,430 L340,470 L310,470 Z" fill="#c96442" opacity="0.3"/>
  </g>

  <!-- Central grand mosque -->
  <g fill="#2c1810" opacity="0.85">
    <rect x="460" y="340" width="360" height="200" rx="3"/>
    <path d="M520,340 Q640,200 760,340" fill="#2c1810"/>
    <circle cx="640" cy="260" r="6" fill="#b8860b" opacity="0.25"/>
    <path d="M460,340 Q510,290 560,340" fill="#2c1810"/>
    <path d="M720,340 Q770,290 820,340" fill="#2c1810"/>
    <rect x="445" y="230" width="14" height="200" rx="1"/>
    <path d="M452,230 L443,242 L461,242 Z"/>
    <circle cx="452" cy="228" r="3.5"/>
    <rect x="441" y="300" width="22" height="6" rx="1"/>
    <rect x="821" y="230" width="14" height="200" rx="1"/>
    <path d="M828,230 L819,242 L837,242 Z"/>
    <circle cx="828" cy="228" r="3.5"/>
    <rect x="817" y="300" width="22" height="6" rx="1"/>
    <path d="M600,420 Q640,380 680,420 L680,530 L600,530 Z" fill="#c96442" opacity="0.2"/>
    <path d="M480,430 Q495,418 510,430 L510,460 L480,460 Z" fill="#c96442" opacity="0.15"/>
    <path d="M520,430 Q535,418 550,430 L550,460 L520,460 Z" fill="#c96442" opacity="0.15"/>
    <path d="M730,430 Q745,418 760,430 L760,460 L730,460 Z" fill="#c96442" opacity="0.15"/>
    <path d="M770,430 Q785,418 800,430 L800,460 L770,460 Z" fill="#c96442" opacity="0.15"/>
  </g>

  <!-- Right side buildings -->
  <g fill="#2c1810" opacity="0.65">
    <rect x="900" y="300" width="80" height="240" rx="2"/>
    <path d="M900,300 Q940,250 980,300" fill="#2c1810"/>
    <circle cx="940" cy="272" r="4" fill="#b8860b" opacity="0.2"/>
    <path d="M915,350 Q925,340 935,350 L935,375 L915,375 Z" fill="#c96442" opacity="0.2"/>
    <path d="M945,350 Q955,340 965,350 L965,375 L945,375 Z" fill="#c96442" opacity="0.2"/>
    <rect x="1020" y="260" width="16" height="280" rx="1"/>
    <path d="M1028,260 L1018,272 L1038,272 Z"/>
    <circle cx="1028" cy="258" r="3.5"/>
    <rect x="1016" y="330" width="24" height="6" rx="1"/>
    <rect x="1060" y="360" width="70" height="180" rx="2"/>
    <rect x="1058" y="356" width="74" height="6" fill="#c96442" opacity="0.3"/>
    <rect x="1150" y="380" width="60" height="160" rx="2"/>
    <path d="M1150,380 Q1180,340 1210,380" fill="#2c1810"/>
  </g>

  <!-- Ground level -->
  <rect x="0" y="530" width="1280" height="190" fill="#2c1810" opacity="0.9"/>

  <!-- Ground arches -->
  <g fill="#c96442" opacity="0.12">
    <path d="M50,560 Q80,540 110,560 L110,600 L50,600 Z"/>
    <path d="M150,560 Q180,540 210,560 L210,600 L150,600 Z"/>
    <path d="M250,560 Q280,540 310,560 L310,600 L250,600 Z"/>
    <path d="M350,560 Q380,540 410,560 L410,600 L350,600 Z"/>
    <path d="M870,560 Q900,540 930,560 L930,600 L870,600 Z"/>
    <path d="M970,560 Q1000,540 1030,560 L1030,600 L970,600 Z"/>
    <path d="M1070,560 Q1100,540 1130,560 L1130,600 L1070,600 Z"/>
    <path d="M1170,560 Q1200,540 1230,560 L1230,600 L1170,600 Z"/>
  </g>

  <!-- Warm light windows -->
  <g fill="#b8860b" opacity="0.3">
    <rect x="500" y="560" width="8" height="12" rx="1"/>
    <rect x="520" y="560" width="8" height="12" rx="1"/>
    <rect x="550" y="555" width="8" height="12" rx="1"/>
    <rect x="680" y="560" width="8" height="12" rx="1"/>
    <rect x="700" y="558" width="8" height="12" rx="1"/>
    <rect x="730" y="562" width="8" height="12" rx="1"/>
  </g>

  <!-- Dust particles -->
  <g fill="#faf5ed" opacity="0.06">
    <circle cx="200" cy="250" r="2"/>
    <circle cx="500" cy="300" r="1.5"/>
    <circle cx="800" cy="280" r="2"/>
    <circle cx="1100" cy="250" r="1.5"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="680" width="1280" height="40" fill="#2c1810"/>

  <!-- Birds -->
  <g fill="none" stroke="#2c1810" stroke-width="1.5" opacity="0.3">
    <path d="M300,150 Q306,143 312,150 Q318,143 324,150"/>
    <path d="M340,130 Q345,124 350,130 Q355,124 360,130"/>
    <path d="M280,170 Q285,164 290,170 Q295,164 300,170"/>
  </g>

  <rect width="1280" height="720" fill="#c96442" opacity="0.05"/>
</svg>