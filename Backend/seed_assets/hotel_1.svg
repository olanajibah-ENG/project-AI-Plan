<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="resortSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4894a"/>
      <stop offset="40%" stop-color="#e8c070"/>
      <stop offset="70%" stop-color="#f0d88a"/>
      <stop offset="100%" stop-color="#faf5ed"/>
    </linearGradient>
    <linearGradient id="poolWater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a8070"/>
      <stop offset="100%" stop-color="#1a6b5a"/>
    </linearGradient>
    <linearGradient id="buildingFace" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#faf5ed"/>
      <stop offset="100%" stop-color="#e8ddd0"/>
    </linearGradient>
    <linearGradient id="buildingSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4c4b0"/>
      <stop offset="100%" stop-color="#c9b8a2"/>
    </linearGradient>
    <linearGradient id="glassReflect" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8dc5d6" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#faf5ed" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8dc5d6" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="poolReflect">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="resortGlow">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1280" height="720" fill="url(#resortSky)"/>

  <!-- Distant landscape -->
  <path d="M0,380 C200,365 400,375 640,360 C880,345 1100,370 1280,355 L1280,420 L0,420 Z" fill="#1a6b5a" opacity="0.12"/>

  <!-- Ground / landscape -->
  <rect x="0" y="400" width="1280" height="320" fill="#1a6b5a" opacity="0.15"/>
  <path d="M0,400 C320,390 640,410 960,395 C1120,388 1200,400 1280,395 L1280,720 L0,720 Z" fill="#e8ddd0" opacity="0.3"/>

  <!-- Main resort building -->
  <g>
    <!-- Building body - main face -->
    <rect x="300" y="180" width="500" height="280" fill="url(#buildingFace)" rx="3"/>
    <!-- Building side wing right -->
    <path d="M800,200 L900,240 L900,460 L800,460 Z" fill="url(#buildingSide)"/>
    <!-- Building side wing left -->
    <path d="M200,240 L300,200 L300,460 L200,460 Z" fill="url(#buildingSide)" opacity="0.9"/>

    <!-- Roof line -->
    <rect x="290" y="172" width="520" height="12" fill="#c96442" opacity="0.5" rx="2"/>

    <!-- Large windows - grid -->
    <g fill="url(#glassReflect)">
      <!-- Row 1 -->
      <rect x="330" y="210" width="60" height="50" rx="2"/>
      <rect x="410" y="210" width="60" height="50" rx="2"/>
      <rect x="490" y="210" width="60" height="50" rx="2"/>
      <rect x="570" y="210" width="60" height="50" rx="2"/>
      <rect x="650" y="210" width="60" height="50" rx="2"/>
      <rect x="730" y="210" width="60" height="50" rx="2"/>
      <!-- Row 2 -->
      <rect x="330" y="280" width="60" height="50" rx="2"/>
      <rect x="410" y="280" width="60" height="50" rx="2"/>
      <rect x="490" y="280" width="60" height="50" rx="2"/>
      <rect x="570" y="280" width="60" height="50" rx="2"/>
      <rect x="650" y="280" width="60" height="50" rx="2"/>
      <rect x="730" y="280" width="60" height="50" rx="2"/>
      <!-- Row 3 -->
      <rect x="330" y="350" width="60" height="50" rx="2"/>
      <rect x="410" y="350" width="60" height="50" rx="2"/>
      <rect x="490" y="350" width="60" height="50" rx="2"/>
      <rect x="570" y="350" width="60" height="50" rx="2"/>
      <rect x="650" y="350" width="60" height="50" rx="2"/>
      <rect x="730" y="350" width="60" height="50" rx="2"/>
    </g>

    <!-- Balcony lines -->
    <g stroke="#c9b8a2" stroke-width="1.5" fill="none" opacity="0.4">
      <line x1="320" y1="270" x2="790" y2="270"/>
      <line x1="320" y1="340" x2="790" y2="340"/>
      <line x1="320" y1="410" x2="790" y2="410"/>
    </g>

    <!-- Entrance -->
    <rect x="510" y="400" width="80" height="60" fill="#2c1810" opacity="0.4" rx="2"/>
    <path d="M510,400 Q550,380 590,400" fill="#2c1810" opacity="0.3"/>

    <!-- Right wing windows -->
    <g fill="url(#glassReflect)" opacity="0.7">
      <rect x="820" y="260" width="50" height="40" rx="2"/>
      <rect x="820" y="320" width="50" height="40" rx="2"/>
      <rect x="820" y="380" width="50" height="40" rx="2"/>
    </g>
  </g>

  <!-- Pool area -->
  <g>
    <!-- Pool deck -->
    <rect x="280" y="470" width="540" height="120" rx="8" fill="#e8ddd0" opacity="0.6"/>
    <!-- Pool water -->
    <rect x="310" y="485" width="480" height="90" rx="6" fill="url(#poolWater)" opacity="0.8"/>
    <!-- Pool water highlights -->
    <path d="M340,510 C380,505 420,515 460,508 C500,502 540,512 580,506 C620,500 660,510 700,504 C740,498 760,505 770,502" fill="none" stroke="#faf5ed" stroke-width="0.8" opacity="0.2"/>
    <path d="M340,530 C380,525 420,535 460,528 C500,522 540,532 580,526 C620,520 660,530 700,524" fill="none" stroke="#faf5ed" stroke-width="0.8" opacity="0.15"/>
    <path d="M340,550 C380,546 420,554 460,548 C500,542 540,552 580,546 C620,540 660,550 700,544" fill="none" stroke="#faf5ed" stroke-width="0.6" opacity="0.1"/>
    <!-- Pool reflection of building -->
    <rect x="400" y="490" width="300" height="60" fill="#faf5ed" opacity="0.06" filter="url(#poolReflect)"/>

    <!-- Pool edge glow -->
    <rect x="308" y="483" width="484" height="94" rx="7" fill="none" stroke="#1a6b5a" stroke-width="2" opacity="0.2"/>

    <!-- Lounge chairs -->
    <g fill="#c96442" opacity="0.35">
      <rect x="830" y="490" width="40" height="12" rx="2"/>
      <rect x="830" y="520" width="40" height="12" rx="2"/>
      <rect x="830" y="550" width="40" height="12" rx="2"/>
      <!-- Umbrella -->
      <line x1="880" y1="480" x2="880" y2="510" stroke="#c96442" stroke-width="2" opacity="0.4"/>
      <path d="M865,480 Q880,465 895,480" fill="#c96442" opacity="0.3"/>
    </g>
  </g>

  <!-- Palm trees -->
  <g>
    <!-- Left palm -->
    <path d="M140,460 C150,400 138,320 160,240" fill="none" stroke="#2c1810" stroke-width="7" stroke-linecap="round"/>
    <path d="M160,240 C140,218 118,222 98,232" fill="none" stroke="#1a6b5a" stroke-width="3.5" opacity="0.8"/>
    <path d="M160,240 C178,216 198,220 218,230" fill="none" stroke="#1a6b5a" stroke-width="3.5" opacity="0.8"/>
    <path d="M160,240 C155,212 152,200 148,186" fill="none" stroke="#1a6b5a" stroke-width="2.5" opacity="0.6"/>
    <path d="M160,240 C168,215 172,205 178,192" fill="none" stroke="#1a6b5a" stroke-width="2.5" opacity="0.6"/>
    <path d="M160,240 C142,215 130,212 116,218" fill="none" stroke="#1a6b5a" stroke-width="2.5" opacity="0.65"/>

    <!-- Right palms -->
    <path d="M1000,450 C1010,395 998,320 1020,250" fill="none" stroke="#2c1810" stroke-width="7" stroke-linecap="round"/>
    <path d="M1020,250 C1000,228 978,232 958,242" fill="none" stroke="#1a6b5a" stroke-width="3.5" opacity="0.8"/>
    <path d="M1020,250 C1038,226 1058,230 1078,240" fill="none" stroke="#1a6b5a" stroke-width="3.5" opacity="0.8"/>
    <path d="M1020,250 C1015,222 1012,210 1008,196" fill="none" stroke="#1a6b5a" stroke-width="2.5" opacity="0.6"/>
    <path d="M1020,250 C1028,225 1032,215 1038,202" fill="none" stroke="#1a6b5a" stroke-width="2.5" opacity="0.6"/>

    <path d="M1080,460 C1088,410 1080,340 1100,280" fill="none" stroke="#2c1810" stroke-width="6" stroke-linecap="round"/>
    <path d="M1100,280 C1082,260 1065,262 1048,272" fill="none" stroke="#1a6b5a" stroke-width="3" opacity="0.75"/>
    <path d="M1100,280 C1116,258 1132,262 1148,272" fill="none" stroke="#1a6b5a" stroke-width="3" opacity="0.75"/>
    <path d="M1100,280 C1096,255 1094,245 1092,232" fill="none" stroke="#1a6b5a" stroke-width="2" opacity="0.55"/>
  </g>

  <!-- Landscaping -->
  <g fill="#1a6b5a" opacity="0.25">
    <ellipse cx="200" cy="468" rx="50" ry="15"/>
    <ellipse cx="280" cy="472" rx="30" ry="10"/>
    <ellipse cx="920" cy="470" rx="45" ry="14"/>
    <ellipse cx="1050" cy="465" rx="40" ry="12"/>
  </g>

  <!-- Foreground pathway -->
  <path d="M0,620 C200,610 400,625 640,615 C880,605 1100,620 1280,612 L1280,720 L0,720 Z" fill="#d4a05a" opacity="0.3"/>
  <path d="M0,650 C320,640 640,655 960,645 C1120,640 1200,648 1280,644 L1280,720 L0,720 Z" fill="#c96442" opacity="0.15"/>

  <!-- Warm atmosphere -->
  <rect width="1280" height="720" fill="#b8860b" opacity="0.04"/>
</svg>