<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="tropSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6b5a" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#2d8a6e"/>
      <stop offset="55%" stop-color="#b8860b" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#e8c96a"/>
      <stop offset="100%" stop-color="#faf5ed"/>
    </linearGradient>
    <radialGradient id="tropSun" cx="0.8" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#faf5ed" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#b8860b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a6b5a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tropOcean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a8070"/>
      <stop offset="40%" stop-color="#1a6b5a"/>
      <stop offset="100%" stop-color="#0d4a3a"/>
    </linearGradient>
    <linearGradient id="tropBeach" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c96a"/>
      <stop offset="100%" stop-color="#d4a05a"/>
    </linearGradient>
    <filter id="tropGlow">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1280" height="720" fill="url(#tropSky)"/>

  <!-- Sun warm glow -->
  <circle cx="1050" cy="300" r="250" fill="url(#tropSun)" filter="url(#tropGlow)"/>
  <circle cx="1050" cy="300" r="45" fill="#faf5ed" opacity="0.5"/>
  <circle cx="1050" cy="300" r="30" fill="#faf5ed" opacity="0.7"/>

  <!-- Light rays -->
  <g opacity="0.06">
    <polygon points="1050,300 900,0 950,0" fill="#faf5ed"/>
    <polygon points="1050,300 1100,0 1150,0" fill="#faf5ed"/>
    <polygon points="1050,300 1280,100 1280,160" fill="#faf5ed"/>
    <polygon points="1050,300 700,0 760,0" fill="#faf5ed"/>
  </g>

  <!-- Wispy clouds -->
  <ellipse cx="300" cy="100" rx="180" ry="15" fill="#faf5ed" opacity="0.2"/>
  <ellipse cx="700" cy="80" rx="140" ry="12" fill="#faf5ed" opacity="0.15"/>

  <!-- Ocean -->
  <path d="M0,420 L1280,420 L1280,720 L0,720 Z" fill="url(#tropOcean)"/>

  <!-- Ocean waves -->
  <path d="M0,430 C80,424 160,436 240,428 C320,420 400,432 480,426 C560,420 640,432 720,424 C800,418 880,430 960,422 C1040,416 1120,428 1200,420 L1280,425 L1280,460 L0,460 Z" fill="#1a6b5a" opacity="0.7"/>
  <path d="M0,450 C100,444 200,456 300,448 C400,440 500,454 600,446 C700,438 800,452 900,444 C1000,436 1100,450 1200,442 L1280,446 L1280,490 L0,490 Z" fill="#146855" opacity="0.8"/>
  <path d="M0,480 C120,474 240,486 360,478 C480,470 600,484 720,476 C840,468 960,482 1080,474 L1280,478 L1280,520 L0,520 Z" fill="#0d5545"/>

  <!-- Wave foam lines -->
  <path d="M0,430 C80,424 160,436 240,428 C320,420 400,432 480,426" fill="none" stroke="#faf5ed" stroke-width="1" opacity="0.12"/>
  <path d="M600,422 C700,416 800,428 900,420 C1000,414 1100,426 1200,418" fill="none" stroke="#faf5ed" stroke-width="1" opacity="0.1"/>

  <!-- Sun reflection on water -->
  <ellipse cx="1050" cy="440" rx="60" ry="5" fill="#b8860b" opacity="0.2"/>
  <ellipse cx="1050" cy="460" rx="40" ry="3" fill="#b8860b" opacity="0.12"/>

  <!-- Beach sand -->
  <path d="M0,510 C200,500 400,520 600,505 C700,498 750,510 800,505 L800,720 L0,720 Z" fill="url(#tropBeach)"/>
  <path d="M0,530 C100,522 200,535 300,525 C400,518 500,530 600,520 C650,515 700,525 750,518 L750,720 L0,720 Z" fill="#d4a05a" opacity="0.8"/>

  <!-- Sand texture -->
  <g stroke="#c96442" stroke-width="0.5" fill="none" opacity="0.15">
    <path d="M50,550 C80,546 110,554 140,548 C170,542 200,552 230,546"/>
    <path d="M0,580 C40,575 80,585 120,578 C160,572 200,582 240,576"/>
    <path d="M100,610 C140,606 180,614 220,608 C260,602 300,612 340,606"/>
  </g>

  <!-- Palm tree cluster left -->
  <g>
    <path d="M180,510 C185,460 170,380 200,280" fill="none" stroke="#2c1810" stroke-width="8" stroke-linecap="round"/>
    <path d="M200,280 C170,255 140,260 110,275" fill="none" stroke="#1a6b5a" stroke-width="4" opacity="0.85"/>
    <path d="M200,280 C180,250 160,245 135,252" fill="none" stroke="#1a6b5a" stroke-width="3" opacity="0.7"/>
    <path d="M200,280 C220,252 245,250 270,260" fill="none" stroke="#1a6b5a" stroke-width="4" opacity="0.85"/>
    <path d="M200,280 C230,258 255,260 280,272" fill="none" stroke="#1a6b5a" stroke-width="3" opacity="0.7"/>
    <path d="M200,280 C205,248 210,235 215,220" fill="none" stroke="#1a6b5a" stroke-width="3" opacity="0.6"/>
    <path d="M200,280 C190,250 185,238 180,225" fill="none" stroke="#1a6b5a" stroke-width="2.5" opacity="0.55"/>
    <circle cx="195" cy="285" r="4" fill="#2c1810" opacity="0.6"/>
    <circle cx="205" cy="288" r="4" fill="#2c1810" opacity="0.6"/>

    <path d="M250,508 C260,465 245,400 270,320" fill="none" stroke="#2c1810" stroke-width="7" stroke-linecap="round"/>
    <path d="M270,320 C250,298 230,300 210,310" fill="none" stroke="#1a6b5a" stroke-width="3.5" opacity="0.8"/>
    <path d="M270,320 C290,295 310,298 332,308" fill="none" stroke="#1a6b5a" stroke-width="3.5" opacity="0.8"/>
    <path d="M270,320 C265,292 262,280 258,265" fill="none" stroke="#1a6b5a" stroke-width="2.5" opacity="0.6"/>

    <path d="M130,515 C128,480 140,440 125,370" fill="none" stroke="#2c1810" stroke-width="6" stroke-linecap="round"/>
    <path d="M125,370 C108,352 88,355 70,365" fill="none" stroke="#1a6b5a" stroke-width="3" opacity="0.75"/>
    <path d="M125,370 C140,350 158,352 175,362" fill="none" stroke="#1a6b5a" stroke-width="3" opacity="0.75"/>
    <path d="M125,370 C122,345 120,335 118,322" fill="none" stroke="#1a6b5a" stroke-width="2" opacity="0.55"/>
  </g>

  <!-- Palm tree right -->
  <g>
    <path d="M720,505 C730,460 718,380 745,290" fill="none" stroke="#2c1810" stroke-width="7" stroke-linecap="round"/>
    <path d="M745,290 C725,268 705,272 685,282" fill="none" stroke="#1a6b5a" stroke-width="3.5" opacity="0.8"/>
    <path d="M745,290 C762,265 782,268 800,278" fill="none" stroke="#1a6b5a" stroke-width="3.5" opacity="0.8"/>
    <path d="M745,290 C742,262 740,250 738,236" fill="none" stroke="#1a6b5a" stroke-width="2.5" opacity="0.6"/>
    <path d="M745,290 C730,262 718,258 705,265" fill="none" stroke="#1a6b5a" stroke-width="2.5" opacity="0.65"/>
  </g>

  <!-- Distant birds -->
  <g fill="none" stroke="#2c1810" stroke-width="1.5" opacity="0.3">
    <path d="M500,120 Q505,114 510,120 Q515,114 520,120"/>
    <path d="M540,100 Q544,95 548,100 Q552,95 556,100"/>
    <path d="M470,140 Q474,135 478,140 Q482,135 486,140"/>
    <path d="M560,130 Q563,126 566,130 Q569,126 572,130"/>
    <path d="M490,155 Q493,150 496,155 Q499,150 502,155"/>
  </g>

  <rect width="1280" height="720" fill="#c96442" opacity="0.03"/>
</svg>