<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="lodgeSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6b5a" stop-opacity="0.5"/>
      <stop offset="35%" stop-color="#6aa8a0"/>
      <stop offset="65%" stop-color="#c9dfe8"/>
      <stop offset="100%" stop-color="#faf5ed"/>
    </linearGradient>
    <linearGradient id="snowPeak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf5ed"/>
      <stop offset="40%" stop-color="#e8ddd0"/>
      <stop offset="100%" stop-color="#1a6b5a" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="lodgeWood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a3520"/>
      <stop offset="100%" stop-color="#2c1810"/>
    </linearGradient>
    <linearGradient id="snowGround" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf5ed"/>
      <stop offset="100%" stop-color="#e8ddd0"/>
    </linearGradient>
    <filter id="windowGlow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="snowSoft">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1280" height="720" fill="url(#lodgeSky)"/>

  <!-- Far mountain range with snow caps -->
  <g>
    <!-- Mountain 1 - far left -->
    <path d="M0,400 L100,240 L200,300 L300,200 L420,320 L420,500 L0,500 Z" fill="#1a6b5a" opacity="0.3"/>
    <path d="M100,240 L140,270 L200,300 L300,200 L260,230" fill="#faf5ed" opacity="0.5"/>

    <!-- Mountain 2 - center back -->
    <path d="M300,450 L500,180 L640,250 L780,160 L900,280 L1000,350 L1000,500 L300,500 Z" fill="#1a6b5a" opacity="0.35"/>
    <path d="M500,180 L560,220 L640,250 L780,160 L720,200" fill="#faf5ed" opacity="0.6"/>
    <path d="M500,180 L530,200" fill="none" stroke="#faf5ed" stroke-width="2" opacity="0.4"/>
    <path d="M780,160 L810,190" fill="none" stroke="#faf5ed" stroke-width="2" opacity="0.4"/>

    <!-- Mountain 3 - far right -->
    <path d="M850,420 L1000,250 L1100,300 L1200,220 L1280,280 L1280,500 L850,500 Z" fill="#1a6b5a" opacity="0.3"/>
    <path d="M1000,250 L1050,280 L1100,300 L1200,220 L1150,250" fill="#faf5ed" opacity="0.5"/>
  </g>

  <!-- Mid mountains -->
  <path d="M0,480 L150,380 L300,420 L450,360 L600,400 L750,350 L900,400 L1050,370 L1200,410 L1280,380 L1280,550 L0,550 Z" fill="#1a6b5a" opacity="0.5"/>

  <!-- Pine forest on mid mountains -->
  <g fill="#2c1810" opacity="0.35">
    <path d="M100,420 L108,390 L116,420 Z"/>
    <path d="M140,410 L150,375 L160,410 Z"/>
    <path d="M180,415 L188,385 L196,415 Z"/>
    <path d="M220,405 L230,370 L240,405 Z"/>
    <path d="M280,410 L290,378 L300,410 Z"/>
    <path d="M350,395 L360,360 L370,395 Z"/>
    <path d="M420,405 L430,370 L440,405 Z"/>
    <path d="M480,395 L490,362 L500,395 Z"/>
    <path d="M550,400 L558,368 L566,400 Z"/>
    <path d="M630,385 L640,350 L650,385 Z"/>
    <path d="M700,395 L710,360 L720,395 Z"/>
    <path d="M780,385 L790,352 L800,385 Z"/>
    <path d="M860,395 L870,362 L880,395 Z"/>
    <path d="M940,388 L950,355 L960,388 Z"/>
    <path d="M1020,395 L1030,362 L1040,395 Z"/>
    <path d="M1100,400 L1108,368 L1116,400 Z"/>
    <path d="M1180,405 L1190,372 L1200,405 Z"/>
  </g>

  <!-- Snow-covered ground -->
  <path d="M0,520 C200,510 400,525 640,515 C880,505 1100,520 1280,510 L1280,720 L0,720 Z" fill="url(#snowGround)"/>

  <!-- Snow texture undulations -->
  <path d="M0,560 C160,552 320,565 480,555 C640,548 800,560 960,552 C1100,546 1200,558 1280,550" fill="none" stroke="#faf5ed" stroke-width="2" opacity="0.3"/>
  <path d="M0,600 C200,594 400,605 640,596 C880,588 1100,600 1280,592" fill="none" stroke="#faf5ed" stroke-width="1.5" opacity="0.2"/>

  <!-- Lodge chalet building -->
  <g>
    <!-- Main structure -->
    <rect x="420" y="360" width="440" height="200" fill="url(#lodgeWood)" rx="3"/>

    <!-- Roof -->
    <path d="M380,360 L640,240 L900,360 Z" fill="#2c1810"/>
    <path d="M380,360 L640,240 L900,360" fill="none" stroke="#5a3520" stroke-width="2" opacity="0.5"/>
    <!-- Snow on roof -->
    <path d="M400,355 C450,345 520,350 600,260 Q640,235 680,260 C760,350 830,345 880,355 L860,362 L420,362 Z" fill="#faf5ed" opacity="0.7"/>
    <path d="M420,358 C500,348 580,355 630,270 Q640,250 650,270 C700,355 780,348 860,358" fill="none" stroke="#e8ddd0" stroke-width="1" opacity="0.5"/>

    <!-- Chimney -->
    <rect x="720" y="260" width="30" height="80" fill="#5a3520"/>
    <rect x="715" y="255" width="40" height="8" fill="#2c1810"/>
    <!-- Snow on chimney -->
    <path d="M712,258 C720,252 740,250 758,258" fill="#faf5ed" opacity="0.6"/>

    <!-- Wood plank lines on facade -->
    <g stroke="#1a1008" stroke-width="0.5" opacity="0.15">
      <line x1="420" y1="390" x2="860" y2="390"/>
      <line x1="420" y1="420" x2="860" y2="420"/>
      <line x1="420" y1="450" x2="860" y2="450"/>
      <line x1="420" y1="480" x2="860" y2="480"/>
      <line x1="420" y1="510" x2="860" y2="510"/>
      <line x1="420" y1="540" x2="860" y2="540"/>
    </g>

    <!-- Windows with warm glow -->
    <!-- Window row 1 -->
    <rect x="460" y="380" width="50" height="60" fill="#b8860b" opacity="0.5" rx="2"/>
    <rect x="460" y="380" width="50" height="60" fill="none" stroke="#2c1810" stroke-width="2" rx="2"/>
    <line x1="485" y1="380" x2="485" y2="440" stroke="#2c1810" stroke-width="1.5"/>
    <line x1="460" y1="410" x2="510" y2="410" stroke="#2c1810" stroke-width="1.5"/>
    <!-- Glow -->
    <ellipse cx="485" cy="410" rx="40" ry="35" fill="#b8860b" opacity="0.08" filter="url(#windowGlow)"/>

    <rect x="540" y="380" width="50" height="60" fill="#b8860b" opacity="0.45" rx="2"/>
    <rect x="540" y="380" width="50" height="60" fill="none" stroke="#2c1810" stroke-width="2" rx="2"/>
    <line x1="565" y1="380" x2="565" y2="440" stroke="#2c1810" stroke-width="1.5"/>
    <line x1="540" y1="410" x2="590" y2="410" stroke="#2c1810" stroke-width="1.5"/>
    <ellipse cx="565" cy="410" rx="40" ry="35" fill="#b8860b" opacity="0.08" filter="url(#windowGlow)"/>

    <!-- Large center window (bay) -->
    <rect x="610" y="370" width="60" height="80" fill="#b8860b" opacity="0.55" rx="2"/>
    <rect x="610" y="370" width="60" height="80" fill="none" stroke="#2c1810" stroke-width="2.5" rx="2"/>
    <line x1="640" y1="370" x2="640" y2="450" stroke="#2c1810" stroke-width="2"/>
    <line x1="610" y1="410" x2="670" y2="410" stroke="#2c1810" stroke-width="2"/>
    <ellipse cx="640" cy="410" rx="50" ry="45" fill="#b8860b" opacity="0.1" filter="url(#windowGlow)"/>

    <rect x="690" y="380" width="50" height="60" fill="#b8860b" opacity="0.4" rx="2"/>
    <rect x="690" y="380" width="50" height="60" fill="none" stroke="#2c1810" stroke-width="2" rx="2"/>
    <line x1="715" y1="380" x2="715" y2="440" stroke="#2c1810" stroke-width="1.5"/>
    <line x1="690" y1="410" x2="740" y2="410" stroke="#2c1810" stroke-width="1.5"/>
    <ellipse cx="715" cy="410" rx="40" ry="35" fill="#b8860b" opacity="0.08" filter="url(#windowGlow)"/>

    <rect x="770" y="380" width="50" height="60" fill="#b8860b" opacity="0.45" rx="2"/>
    <rect x="770" y="380" width="50" height="60" fill="none" stroke="#2c1810" stroke-width="2" rx="2"/>
    <line x1="795" y1="380" x2="795" y2="440" stroke="#2c1810" stroke-width="1.5"/>
    <line x1="770" y1="410" x2="820" y2="410" stroke="#2c1810" stroke-width="1.5"/>
    <ellipse cx="795" cy="410" rx="40" ry="35" fill="#b8860b" opacity="0.08" filter="url(#windowGlow)"/>

    <!-- Window row 2 (smaller, upper) -->
    <rect x="500" y="470" width="40" height="50" fill="#b8860b" opacity="0.35" rx="2"/>
    <rect x="500" y="470" width="40" height="50" fill="none" stroke="#2c1810" stroke-width="1.5" rx="2"/>
    <rect x="580" y="470" width="40" height="50" fill="#b8860b" opacity="0.35" rx="2"/>
    <rect x="580" y="470" width="40" height="50" fill="none" stroke="#2c1810" stroke-width="1.5" rx="2"/>
    <rect x="660" y="470" width="40" height="50" fill="#b8860b" opacity="0.35" rx="2"/>
    <rect x="660" y="470" width="40" height="50" fill="none" stroke="#2c1810" stroke-width="1.5" rx="2"/>
    <rect x="740" y="470" width="40" height="50" fill="#b8860b" opacity="0.35" rx="2"/>
    <rect x="740" y="470" width="40" height="50" fill="none" stroke="#2c1810" stroke-width="1.5" rx="2"/>

    <!-- Door -->
    <rect x="618" y="500" width="44" height="60" fill="#2c1810" opacity="0.8" rx="2"/>
    <circle cx="654" cy="530" r="3" fill="#b8860b" opacity="0.4"/>
  </g>

  <!-- Pine trees near lodge -->
  <g fill="#2c1810" opacity="0.8">
    <!-- Left pines -->
    <path d="M300,560 L325,420 L350,560 Z"/>
    <path d="M310,480 L325,420 L340,480 Z"/>
    <rect x="322" y="540" width="6" height="20"/>
    <path d="M350,555 L370,440 L390,555 Z"/>
    <path d="M358,490 L370,440 L382,490 Z"/>
    <rect x="367" y="535" width="6" height="20"/>

    <!-- Right pines -->
    <path d="M890,555 L915,430 L940,555 Z"/>
    <path d="M900,480 L915,430 L930,480 Z"/>
    <rect x="912" y="535" width="6" height="20"/>
    <path d="M950,560 L970,445 L990,560 Z"/>
    <path d="M958,495 L970,445 L982,495 Z"/>
    <rect x="967" y="540" width="6" height="20"/>
    <path d="M1010,550 L1035,420 L1060,550 Z"/>
    <path d="M1020,475 L1035,420 L1050,475 Z"/>
    <rect x="1032" y="530" width="6" height="20"/>
  </g>

  <!-- Snow on ground near lodge -->
  <ellipse cx="640" cy="565" rx="250" ry="10" fill="#faf5ed" opacity="0.4" filter="url(#snowSoft)"/>

  <!-- Footpath to door -->
  <path d="M640,560 C640,580 620,620 600,680 L680,680 C660,620 640,580 640,560" fill="#d4c4b0" opacity="0.2"/>

  <!-- Smoke from chimney -->
  <g fill="#faf5ed" opacity="0.1">
    <ellipse cx="735" cy="240" rx="15" ry="8"/>
    <ellipse cx="740" cy="220" rx="12" ry="6"/>
    <ellipse cx="738" cy="200" rx="10" ry="5"/>
    <ellipse cx="742" cy="182" rx="8" ry="4"/>
  </g>
</svg>