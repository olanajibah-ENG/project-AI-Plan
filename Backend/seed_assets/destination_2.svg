<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="dawnSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6b5a" stop-opacity="0.7"/>
      <stop offset="35%" stop-color="#3d8b7a"/>
      <stop offset="60%" stop-color="#c9a86c"/>
      <stop offset="85%" stop-color="#faf5ed"/>
      <stop offset="100%" stop-color="#faf5ed" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="mtnMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6b5a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1a6b5a" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="mtnNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c1810"/>
      <stop offset="100%" stop-color="#1a3a30"/>
    </linearGradient>
    <radialGradient id="dawnGlow" cx="0.7" cy="0.55" r="0.5">
      <stop offset="0%" stop-color="#faf5ed" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#b8860b" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1a6b5a" stop-opacity="0"/>
    </radialGradient>
    <filter id="mistBlur">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <filter id="softMist">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Sky gradient -->
  <rect width="1280" height="720" fill="url(#dawnSky)"/>

  <!-- Dawn glow on horizon -->
  <ellipse cx="900" cy="380" rx="500" ry="200" fill="url(#dawnGlow)"/>

  <!-- Subtle sky streaks -->
  <path d="M0,120 Q320,100 640,115 Q960,130 1280,110" fill="none" stroke="#faf5ed" stroke-width="1" opacity="0.08"/>
  <path d="M0,160 Q320,145 640,155 Q960,165 1280,150" fill="none" stroke="#faf5ed" stroke-width="0.8" opacity="0.06"/>

  <!-- Far mountain range -->
