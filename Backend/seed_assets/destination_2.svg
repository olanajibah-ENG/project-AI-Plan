  <!-- Mist between far and mid mountains -->
  <ellipse cx="640" cy="420" rx="700" ry="60" fill="#faf5ed" opacity="0.3" filter="url(#mistBlur)"/>
  <ellipse cx="300" cy="400" rx="250" ry="40" fill="#faf5ed" opacity="0.2" filter="url(#mistBlur)"/>
  <ellipse cx="1000" cy="410" rx="300" ry="45" fill="#faf5ed" opacity="0.25" filter="url(#mistBlur)"/>

  <!-- Mid mountain range -->
  <path d="M0,480 L60,420 L140,450 L240,370 L340,410 L420,350 L520,400 L600,340 L700,380 L800,320 L900,370 L980,340 L1060,380 L1140,330 L1220,370 L1280,350 L1280,550 L0,550 Z" fill="url(#mtnMid)" opacity="0.7"/>

  <!-- Mist in valleys -->
  <ellipse cx="400" cy="470" rx="200" ry="30" fill="#faf5ed" opacity="0.25" filter="url(#softMist)"/>
  <ellipse cx="800" cy="460" rx="180" ry="25" fill="#faf5ed" opacity="0.2" filter="url(#softMist)"/>
  <ellipse cx="1100" cy="475" rx="160" ry="28" fill="#faf5ed" opacity="0.22" filter="url(#softMist)"/>

  <!-- Near mountain range -->
